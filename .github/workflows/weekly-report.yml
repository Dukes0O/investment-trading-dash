# Weekly Trend Desk report, generated by Claude Code in CI.
#
# Setup (one-time):
#   1. Add repo secret ANTHROPIC_API_KEY (console.anthropic.com).
#   2. Optionally add TWELVEDATA_API_KEY and/or ALPHAVANTAGE_API_KEY secrets
#      and set TRENDDESK_PROVIDER below — otherwise the run uses demo data.
#   3. To enable the Monday pre-market schedule, uncomment the `schedule` block.
#
# CI has no SQLite DB, so the pipeline automatically reads the committed
# data/portfolio.json printout — keep it up to date (the app rewrites it on
# every change; commit it).

name: weekly-report

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "0 13 * * 1"   # Mondays 13:00 UTC ≈ pre-market US

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate weekly report
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: "/weekly-report"
          claude_args: |
            --allowedTools "Bash(node scripts/*),Bash(git add:*),Bash(git commit:*),Read,Write,Glob,Grep,WebSearch"
        env:
          TRENDDESK_PROVIDER: demo   # set to twelvedata/alphavantage with a key secret below
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}

      - name: Push report
        run: |
          git push origin HEAD
